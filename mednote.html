<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MED NOTE</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f2f5; --surface:#fff; --surface2:#f7f8fa; --border:#e4e8ef;
  --accent:#0f766e; --accent2:#14b8a6; --accent-light:#f0fdfa;
  --warn:#d97706; --warn-light:#fef3c7;
  --red:#dc2626; --red-light:#fee2e2;
  --text:#111827; --text2:#4b5563; --text3:#9ca3af;
  --font:'Sarabun',sans-serif; --display:'Syne',sans-serif;
  --radius:12px; --radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:0 4px 6px rgba(0,0,0,.05),0 10px 40px rgba(0,0,0,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.6;min-height:100vh}

/* HERO */
.hero{background:linear-gradient(135deg,#134e4a 0%,#0f766e 50%,#14b8a6 100%);padding:40px 20px 36px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(255,255,255,.08) 0%,transparent 60%)}
.hero-title{font-family:var(--display);font-size:clamp(22px,5vw,32px);font-weight:800;color:#fff;letter-spacing:-.5px;margin-bottom:4px;position:relative}
.hero-sub{color:rgba(255,255,255,.6);font-size:13px;margin-bottom:20px;position:relative}
.search-wrap{max-width:600px;margin:0 auto;position:relative}
.search-input{width:100%;padding:14px 52px 14px 18px;border-radius:14px;border:none;font-family:var(--font);font-size:15px;background:#fff;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.2);outline:none;transition:box-shadow .2s}
.search-input:focus{box-shadow:0 8px 32px rgba(0,0,0,.25),0 0 0 3px rgba(255,255,255,.25)}
.search-input::placeholder{color:var(--text3)}
.search-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:18px;pointer-events:none}
.status{display:flex;align-items:center;gap:6px;justify-content:center;margin-top:10px}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4)}
.dot.live{background:#4ade80;box-shadow:0 0 6px #4ade80}
.dot.error{background:#f87171}
.status-text{font-size:11px;color:rgba(255,255,255,.5)}

/* FILTER BAR */
.filters-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.filters-row{display:flex;gap:6px;align-items:center;overflow-x:auto;scrollbar-width:none;max-width:900px;margin:0 auto}
.filters-row::-webkit-scrollbar{display:none}
.filter-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;flex-shrink:0}
.chip{background:var(--surface2);border:1.5px solid var(--border);color:var(--text2);font-family:var(--font);font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;user-select:none}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* MAIN */
main{max-width:900px;margin:0 auto;padding:24px 16px 60px}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--text3);font-size:14px}

/* WARD VIEW */
.ward-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:4px}
.ward-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px 16px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);text-align:center}
.ward-card:hover{border-color:var(--accent2);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.ward-icon{font-size:28px;margin-bottom:8px}
.ward-name{font-family:var(--display);font-weight:700;font-size:14px;color:var(--text)}
.ward-count{font-size:12px;color:var(--text3);margin-top:3px}

/* SECTION TITLE */
.section-title{font-family:var(--display);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* BACK BTN */
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:1.5px solid var(--border);color:var(--text2);font-family:var(--font);font-size:13px;padding:6px 14px;border-radius:20px;cursor:pointer;margin-bottom:16px;transition:all .15s}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}

/* TOPIC CARD */
.topic-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow);transition:border-color .15s}
.topic-card:hover{border-color:#99f6e4}
.topic-card.open{border-color:var(--accent)}
.topic-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;transition:background .15s}
.topic-header:hover{background:var(--surface2)}
.topic-header.open{background:var(--accent-light)}
.topic-info{flex:1;min-width:0}
.topic-name{font-weight:600;font-size:14px;color:var(--text)}
.topic-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.meta-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.meta-type{background:#e0f2fe;color:#0369a1}
.meta-subtype{background:#f3e8ff;color:#7c3aed}
.meta-status-done{background:#dcfce7;color:#166534}
.meta-status-wip{background:#fef9c3;color:#854d0e}
.topic-chevron{color:var(--text3);font-size:11px;transition:transform .2s;flex-shrink:0}
.topic-card.open .topic-chevron{transform:rotate(90deg)}

/* TOPIC CONTENT */
.topic-content{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1);border-top:0 solid var(--border)}
.topic-card.open .topic-content{max-height:5000px;border-top-width:1px}
.topic-content-inner{padding:16px;background:var(--surface2)}

/* NOTION BLOCKS */
.block-h1{font-family:var(--display);font-size:18px;font-weight:700;color:var(--text);margin:12px 0 6px}
.block-h2{font-family:var(--display);font-size:15px;font-weight:700;color:var(--text);margin:10px 0 4px}
.block-h3{font-size:14px;font-weight:600;color:var(--text2);margin:8px 0 4px}
.block-p{font-size:13px;color:var(--text2);margin:4px 0;line-height:1.7}
.block-bullet{font-size:13px;color:var(--text2);padding:2px 0 2px 16px;position:relative;line-height:1.6}
.block-bullet::before{content:'·';position:absolute;left:4px;color:var(--text3)}
.block-numbered{font-size:13px;color:var(--text2);padding:2px 0 2px 20px;position:relative;line-height:1.6}
.block-toggle-wrap{border:1.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin:6px 0;background:var(--surface)}
.block-toggle-head{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;user-select:none;font-size:13px;font-weight:500;color:var(--text);transition:background .15s}
.block-toggle-head:hover{background:var(--surface2)}
.block-toggle-icon{font-size:9px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.block-toggle-wrap.open .block-toggle-icon{transform:rotate(90deg)}
.block-toggle-body{max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1);border-top:0 solid var(--border);padding:0 12px}
.block-toggle-wrap.open .block-toggle-body{max-height:3000px;border-top-width:1px;padding:10px 12px}
.block-divider{border:none;border-top:1px solid var(--border);margin:10px 0}
.loading-inline{color:var(--text3);font-size:12px;font-style:italic;padding:8px 0}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px}

/* SCROLL TOP */
#scrollTop{position:fixed;bottom:24px;right:24px;width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(15,118,110,.4);opacity:0;transition:opacity .2s,transform .2s;z-index:40}
#scrollTop.visible{opacity:1}
#scrollTop:hover{transform:translateY(-2px)}

mark{background:#fef08a;color:#713f12;border-radius:2px;padding:0 1px}

@media(max-width:600px){
  .hero{padding:32px 16px 28px}
  .ward-grid{grid-template-columns:repeat(2,1fr)}
  main{padding:16px 12px 60px}
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-title">📋 MED NOTE</div>
  <div class="hero-sub">คู่มือประจำ ward — ทุก ward ในที่เดียว</div>
  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text"
      placeholder="ค้นหา topic เช่น hypertension, sepsis, fracture..."
      autocomplete="off" spellcheck="false">
    <span class="search-icon">⌕</span>
  </div>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span class="status-text" id="statusText">กำลังเชื่อมต่อ...</span>
  </div>
</div>

<div class="filters-bar">
  <div class="filters-row" id="filtersRow">
    <span class="filter-label">Ward</span>
    <button class="chip active" data-ward="ALL" onclick="setWard('ALL',this)">ทั้งหมด</button>
    <button class="chip" data-ward="INTERNAL MED" onclick="setWard('INTERNAL MED',this)">Internal Med</button>
    <button class="chip" data-ward="GEN-SURGERY" onclick="setWard('GEN-SURGERY',this)">Gen Surgery</button>
    <button class="chip" data-ward="SPEC-SURGERY" onclick="setWard('SPEC-SURGERY',this)">Spec Surgery</button>
    <button class="chip" data-ward="ORTHO" onclick="setWard('ORTHO',this)">Ortho</button>
    <button class="chip" data-ward="ER" onclick="setWard('ER',this)">ER</button>
    <button class="chip" data-ward="MINOR WARD" onclick="setWard('MINOR WARD',this)">Minor Ward</button>
  </div>
</div>

<main id="mainContent">
  <div class="loading" id="loadingEl">
    <div class="spinner"></div>
    <p>กำลังโหลดข้อมูลจาก Notion...</p>
  </div>
</main>

<button id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const WORKER = "https://drugref.phuripon2542.workers.dev";

// Ward databases — Database ID (not collection ID)
const WARDS = [
  { id:"INTERNAL MED",  icon:"🫀", label:"Internal Medicine",  dbId:"2ee3eb4d-888d-8180-bbc8-c2fff5780bd4", nameField:"name",  typeField:"type",  subtypeField:"Subtype" },
  { id:"GEN-SURGERY",   icon:"🔪", label:"General Surgery",    dbId:"2ee3eb4d-888d-8196-b791-ff8c68dad02c", nameField:"name",  typeField:"type",  subtypeField:"Subtype" },
  { id:"SPEC-SURGERY",  icon:"🏥", label:"Special Surgery",    dbId:"2ee3eb4d-888d-8127-afac-e68110c66629", nameField:"name",  typeField:"type",  subtypeField:"Subtype" },
  { id:"ORTHO",         icon:"🦴", label:"Orthopedics",        dbId:"2ee3eb4d-888d-81e0-86a0-c8310ff27913", nameField:"name",  typeField:"type",  subtypeField:"Subtype" },
  { id:"ER",            icon:"🚨", label:"Emergency",          dbId:"2ee3eb4d-888d-81ce-accf-cb782e201184", nameField:"name",  typeField:"type",  subtypeField:"Subtype" },
  { id:"MINOR WARD",    icon:"👁️", label:"Minor Ward",         dbId:"2ee3eb4d-888d-81af-b293-d3f8139c9cc2", nameField:"name",  typeField:"type",  subtypeField:"Subtype" },
];

// ── STATE ────────────────────────────────────────────────────
let allTopics = [];   // { wardId, wardLabel, wardIcon, pageId, name, type, subtype, status, blocksLoaded, blocks }
let activeWard = "ALL";
let searchQuery = "";
let openTopicId = null;
let viewMode = "wards"; // "wards" | "ward-detail" | "search"
let activeWardData = null;

// ── BOOT ────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", async () => {
  await loadAllWards();
  document.getElementById("searchInput").addEventListener("input", debounce(onSearch, 250));
  window.addEventListener("scroll", () =>
    document.getElementById("scrollTop").classList.toggle("visible", window.scrollY > 400));
});

// ── LOAD ALL WARDS ───────────────────────────────────────────
async function loadAllWards() {
  const dot = document.getElementById("statusDot");
  const txt = document.getElementById("statusText");
  try {
    // Load all ward databases in parallel
    const results = await Promise.allSettled(
      WARDS.map(w => loadWardDB(w))
    );
    results.forEach((r, i) => {
      if (r.status === "fulfilled") {
        allTopics.push(...r.value);
      }
    });
    dot.className = "dot live";
    txt.textContent = `${allTopics.length} topics จาก ${WARDS.length} wards`;
    renderWardView();
  } catch(e) {
    dot.className = "dot error";
    txt.textContent = "โหลดไม่สำเร็จ";
    document.getElementById("mainContent").innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div><p>${e.message}</p></div>`;
  }
}

async function loadWardDB(ward) {
  try {
    const res = await fetch(`${WORKER}/db/${ward.dbId}`);
    if (!res.ok) return [];
    const data = await res.json();
    return (data.results || []).map(p => {
      const props = p.properties || {};
      const name = getText(props[ward.nameField]?.title || props["name"]?.title || props["Drug Name"]?.title || []);
      if (!name.trim()) return null;
      return {
        wardId:     ward.id,
        wardLabel:  ward.label,
        wardIcon:   ward.icon,
        pageId:     p.id,
        name:       name.trim(),
        type:       props["type"]?.select?.name || props["Type"]?.select?.name || "",
        subtype:    props["Subtype"]?.select?.name || "",
        status:     props["status"]?.select?.name || props["Status"]?.select?.name || "",
        blocksLoaded: false,
        blocks:     []
      };
    }).filter(Boolean);
  } catch(e) {
    return [];
  }
}

function getText(r) { return (r||[]).map(x => x.plain_text||"").join(""); }

// ── WARD VIEW (home) ─────────────────────────────────────────
function renderWardView() {
  const main = document.getElementById("mainContent");
  const wardTopicCounts = {};
  allTopics.forEach(t => {
    wardTopicCounts[t.wardId] = (wardTopicCounts[t.wardId]||0)+1;
  });

  let html = `<div class="section-title">เลือก Ward</div>`;
  html += `<div class="ward-grid">`;
  WARDS.forEach(w => {
    const cnt = wardTopicCounts[w.id] || 0;
    html += `<div class="ward-card" onclick="enterWard('${w.id}')">
      <div class="ward-icon">${w.icon}</div>
      <div class="ward-name">${w.label}</div>
      <div class="ward-count">${cnt} topics</div>
    </div>`;
  });
  html += `</div>`;
  main.innerHTML = html;
  viewMode = "wards";
}

// ── ENTER WARD ───────────────────────────────────────────────
function enterWard(wardId) {
  activeWard = wardId;
  document.querySelectorAll('[data-ward]').forEach(b => b.classList.toggle('active', b.dataset.ward === wardId));
  viewMode = "ward-detail";
  openTopicId = null;
  renderTopicList(allTopics.filter(t => t.wardId === wardId));
}

function setWard(wardId, el) {
  document.querySelectorAll('[data-ward]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  activeWard = wardId;
  if (searchQuery) { applySearch(); return; }
  if (wardId === 'ALL') { renderWardView(); return; }
  enterWard(wardId);
}

// ── RENDER TOPIC LIST ────────────────────────────────────────
function renderTopicList(topics) {
  const main = document.getElementById("mainContent");
  const ward = WARDS.find(w => w.id === activeWard);

  let html = "";
  if (viewMode !== "search") {
    html += `<button class="back-btn" onclick="goHome()">← กลับ</button>`;
    if (ward) html += `<div class="section-title">${ward.icon} ${ward.label} — ${topics.length} topics</div>`;
  }

  if (!topics.length) {
    main.innerHTML = html + `<div class="empty"><div class="empty-icon">🔍</div><p>ไม่พบ topic ที่ค้นหา</p></div>`;
    return;
  }

  // Group by type if ward view
  if (viewMode === "ward-detail" && !searchQuery) {
    const byType = {};
    topics.forEach(t => {
      const grp = t.type || "อื่นๆ";
      if (!byType[grp]) byType[grp] = [];
      byType[grp].push(t);
    });
    Object.keys(byType).sort().forEach(grp => {
      html += `<div class="section-title" style="margin-top:16px">${grp}</div>`;
      byType[grp].forEach(t => { html += renderTopicCard(t); });
    });
  } else {
    // Search result — group by ward
    const byWard = {};
    topics.forEach(t => {
      if (!byWard[t.wardId]) byWard[t.wardId] = [];
      byWard[t.wardId].push(t);
    });
    Object.keys(byWard).forEach(wid => {
      const w = WARDS.find(x => x.id === wid);
      html += `<div class="section-title" style="margin-top:16px">${w?.icon||''} ${w?.label||wid}</div>`;
      byWard[wid].forEach(t => { html += renderTopicCard(t); });
    });
  }

  main.innerHTML = html;
  main.querySelectorAll(".topic-header").forEach(h =>
    h.addEventListener("click", () => toggleTopic(h.dataset.id)));
  main.querySelectorAll(".block-toggle-head").forEach(h =>
    h.addEventListener("click", () => toggleBlock(h.dataset.id)));
}

function renderTopicCard(t) {
  const isOpen = openTopicId === t.pageId;
  const q = searchQuery.toLowerCase();
  const nameHi = q ? highlight(esc(t.name), q) : esc(t.name);

  let metaTags = "";
  if (t.type)    metaTags += `<span class="meta-tag meta-type">${esc(t.type)}</span>`;
  if (t.subtype) metaTags += `<span class="meta-tag meta-subtype">${esc(t.subtype)}</span>`;
  if (t.status && t.status.includes("finished")) metaTags += `<span class="meta-tag meta-status-done">✓</span>`;
  else if (t.status && !t.status.includes("เปล่า")) metaTags += `<span class="meta-tag meta-status-wip">Draft</span>`;

  return `
<div class="topic-card${isOpen?' open':''}" id="tc-${t.pageId}">
  <div class="topic-header${isOpen?' open':''}" data-id="${t.pageId}">
    <div class="topic-info">
      <div class="topic-name">${nameHi}</div>
      ${metaTags ? `<div class="topic-meta">${metaTags}</div>` : ""}
    </div>
    <span class="topic-chevron">▶</span>
  </div>
  <div class="topic-content" id="tc-body-${t.pageId}">
    <div class="topic-content-inner" id="tc-inner-${t.pageId}">
      <div class="loading-inline">กำลังโหลด...</div>
    </div>
  </div>
</div>`;
}

// ── TOGGLE TOPIC (lazy load) ─────────────────────────────────
async function toggleTopic(pageId) {
  const card = document.getElementById(`tc-${pageId}`);
  const header = card?.querySelector(".topic-header");
  const isOpen = card?.classList.contains("open");

  if (openTopicId && openTopicId !== pageId) {
    const prev = document.getElementById(`tc-${openTopicId}`);
    prev?.classList.remove("open");
    prev?.querySelector(".topic-header")?.classList.remove("open");
  }

  card?.classList.toggle("open", !isOpen);
  header?.classList.toggle("open", !isOpen);
  openTopicId = isOpen ? null : pageId;

  if (!isOpen) {
    const topic = allTopics.find(t => t.pageId === pageId);
    if (topic && !topic.blocksLoaded) {
      topic.blocksLoaded = true;
      try {
        const data = await fetch(`${WORKER}/children/${pageId}`).then(r => r.json());
        topic.blocks = data.results || [];
        const el = document.getElementById(`tc-inner-${pageId}`);
        if (el) {
          el.innerHTML = renderBlocks(topic.blocks, pageId);
          el.querySelectorAll(".block-toggle-head").forEach(h =>
            h.addEventListener("click", () => toggleBlock(h.dataset.id)));
        }
      } catch(e) {
        const el = document.getElementById(`tc-inner-${pageId}`);
        if (el) el.innerHTML = `<div class="loading-inline">โหลดไม่สำเร็จ: ${e.message}</div>`;
      }
    }
  }
}

// ── RENDER BLOCKS ────────────────────────────────────────────
function renderBlocks(blocks, prefix, depth=0) {
  if (!blocks?.length) return `<div class="loading-inline">ยังไม่มีเนื้อหาใน Notion</div>`;
  let html = "";
  let numCounter = 0;
  for (const b of blocks) {
    const text = getBlockText(b);
    const bid = (prefix + b.id.slice(0,8)).replace(/[^a-zA-Z0-9]/g,'');
    const indent = depth > 0 ? `margin-left:${depth*14}px;` : "";

    switch(b.type) {
      case "heading_1": html += `<div class="block-h1" style="${indent}">${esc(text)}</div>`; numCounter=0; break;
      case "heading_2": html += `<div class="block-h2" style="${indent}">${esc(text)}</div>`; numCounter=0; break;
      case "heading_3": html += `<div class="block-h3" style="${indent}">${esc(text)}</div>`; numCounter=0; break;
      case "paragraph":
        if (text.trim()) html += `<div class="block-p" style="${indent}">${esc(text)}</div>`;
        numCounter=0; break;
      case "bulleted_list_item":
        html += `<div class="block-bullet" style="${indent}">${esc(text)}</div>`;
        if (b.children?.length) html += renderBlocks(b.children, bid, depth+1);
        numCounter=0; break;
      case "numbered_list_item":
        numCounter++;
        html += `<div class="block-numbered" style="${indent}">${numCounter}. ${esc(text)}</div>`;
        if (b.children?.length) html += renderBlocks(b.children, bid, depth+1);
        break;
      case "toggle":
        html += `<div class="block-toggle-wrap" id="btw-${bid}">
          <div class="block-toggle-head" data-id="${bid}">
            <span class="block-toggle-icon">▶</span>
            <span>${esc(text)}</span>
          </div>
          <div class="block-toggle-body">
            ${b.children?.length ? renderBlocks(b.children, bid, depth+1) : '<div class="loading-inline">ว่างเปล่า</div>'}
          </div>
        </div>`;
        numCounter=0; break;
      case "divider": html += `<hr class="block-divider">`; numCounter=0; break;
      case "callout":
        html += `<div style="background:#f0fdf4;border-left:3px solid var(--accent);padding:10px 12px;border-radius:6px;margin:6px 0;font-size:13px;color:var(--text2)">${esc(text)}</div>`;
        numCounter=0; break;
      default: if (text.trim()) html += `<div class="block-p" style="${indent}">${esc(text)}</div>`; numCounter=0;
    }
  }
  return html || `<div class="loading-inline">ว่างเปล่า</div>`;
}

function getBlockText(b) {
  const rt = b[b.type]?.rich_text || b[b.type]?.text || [];
  return (rt||[]).map(r => r.plain_text||"").join("");
}

function toggleBlock(id) {
  document.getElementById(`btw-${id}`)?.classList.toggle("open");
}

// ── SEARCH ───────────────────────────────────────────────────
function onSearch(e) {
  searchQuery = e.target.value.trim();
  if (!searchQuery) {
    viewMode = "wards";
    openTopicId = null;
    if (activeWard !== 'ALL') { enterWard(activeWard); return; }
    renderWardView(); return;
  }
  applySearch();
}

function applySearch() {
  const q = searchQuery.toLowerCase();
  let results = allTopics.filter(t =>
    fuzzy(t.name.toLowerCase(), q) ||
    (t.type||"").toLowerCase().includes(q) ||
    (t.subtype||"").toLowerCase().includes(q) ||
    (t.wardLabel||"").toLowerCase().includes(q)
  );
  if (activeWard !== 'ALL') results = results.filter(t => t.wardId === activeWard);
  viewMode = "search";
  openTopicId = null;
  renderTopicList(results);
}

function goHome() {
  searchQuery = "";
  document.getElementById("searchInput").value = "";
  activeWard = "ALL";
  document.querySelectorAll('[data-ward]').forEach(b => b.classList.toggle('active', b.dataset.ward==='ALL'));
  openTopicId = null;
  renderWardView();
}

function fuzzy(str, q) {
  let si=0;
  for (let i=0; i<str.length && si<q.length; i++) if(str[i]===q[si]) si++;
  return si===q.length;
}

// ── HELPERS ──────────────────────────────────────────────────
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function highlight(t,q){if(!q)return t;return t.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`,`gi`),"<mark>$1</mark>")}
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms)}}
</script>
